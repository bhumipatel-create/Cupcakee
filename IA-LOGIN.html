<html lang="en">
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: stretch;
            height: 100vh;
            background-color: rgb(248, 240, 227);
        }
        body::selection{
            color: #7d7272;
            background-color: rgb(250, 242, 222);
        }
        .navbar{
            background-color: rgb(200, 184, 161);
            padding: 10px 20px;
        }
      
        .menu {
            list-style: none;
            margin: 1px;;
            padding: 1px;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        .menu li {
            margin: 0 15px;
        }
        .menu a {
            text-decoration: none;
            color: white;
            padding: 8px 12px;
        }
        .menu a:hover {
            background: #f9f5f5;
            color:brown;
            border-radius: 5px;
        }
        .menu img {
            border-radius: 15px ;
        }
        .login-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            align-items: center;
            justify-content: center;
            margin: 15px auto; /* Center the container */
            padding: 25px;
            width:50%;
            height:50%;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px ;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; 
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 10px ;
            border: 1px solid #ccc;
            border-radius: 50px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; 
        }
        button {
            background-color:  #625347;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #da884a; }

        #loginbutton {
            width: 200px;
            height: 50px ;
        }
        

        
    </style>
</head>
<body>
    <nav class="navbar" >
        <ul class="menu">
            <li><a href="IA-1.html">Home</a></li>
            <li><a href="IA-recipes.html">Recipes</a></li>
            <li><a href="IA-contact.html">About</a></li>
            <li><a href="IA-LOGIN.html">Sign Up</a></li>
            <li>
                <img  src="cupcakeimg.jpg" width="40 px" height="40 px">
                
            </li>
        </ul>   
    </nav>

    <div class="login-container">

        <h2>Sign Up for My Email List</h2>

        Something sweet for your inbox! Join 250K others and subscribe to my free email list. You’ll get every new recipe and baking post as they’re published, plus an email with my most popular baking tips and recipes.
        
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">

        <button onclick="login()" id="loginbutton">Login</button>

        <p id="message" style="color: red;"></p>   

    </div>
    <script>
        function login() {
            let name = document.getElementById("name").value.trim();   // trim cuts out whitespace user may enter 
            let email = document.getElementById("email").value.trim();
            let message = document.getElementById("message");
            
            message.innerText = !name ? "Enter your name." : 
                                !email ? "Enter your email." : 
                                            "Login successful!";
            message.style.color = !name || !email ? "red" : "green";
        }
    </script>
</body>
</html>
